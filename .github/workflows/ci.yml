name: CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

# 同じブランチへの新しい push が来たら古い実行をキャンセルする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────
  # Lint / Format チェック
  # ────────────────────────────────────────
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check core/ tests/

      - name: Ruff format check
        run: ruff format --check core/ tests/

  # ────────────────────────────────────────
  # 型チェック
  # ────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mypy requests selenium types-requests

      - name: mypy
        run: mypy core/ --ignore-missing-imports

  # ────────────────────────────────────────
  # ユニットテスト + カバレッジ
  # ────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install requests selenium
          pip install pytest pytest-cov

      - name: Run tests
        # LM Studio / Selenium が不要なモックテストのみ実行
        # -m "not integration" で実機依存テストをスキップ
        run: |
          pytest tests/ -v -m "not integration and not gui" \
            --cov=core \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  # ────────────────────────────────────────
  # すべて通ったら通知 (PR マージ条件として利用可能)
  # ────────────────────────────────────────
  all-checks-pass:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - run: echo "✅ All CI checks passed!"
